name: Build MaiTavern APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
    paths:
      - "app.js"
      - "index.html"
      - "style.css"
      - "android-ci/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Prepare web assets
        run: |
          chmod +x android-ci/copy-web-assets.sh
          android-ci/copy-web-assets.sh

      - name: Restore release keystore (optional)
        env:
          MAITAVERN_KEYSTORE_BASE64: ${{ secrets.MAITAVERN_KEYSTORE_BASE64 }}
          MAITAVERN_KEYSTORE_PASSWORD: ${{ secrets.MAITAVERN_KEYSTORE_PASSWORD }}
          MAITAVERN_KEY_ALIAS: ${{ secrets.MAITAVERN_KEY_ALIAS }}
        run: |
          if [ -n "${MAITAVERN_KEYSTORE_BASE64}" ]; then
            python -c 'import base64, os, pathlib, re; b64=os.environ.get("MAITAVERN_KEYSTORE_BASE64", ""); b64=re.sub(r"\s+", "", b64); b64 += "=" * ((4 - len(b64) % 4) % 4); pathlib.Path("android-ci/maitavern-release.keystore").write_bytes(base64.b64decode(b64)); print("Release keystore restored.")'

            if [ -n "${MAITAVERN_KEYSTORE_PASSWORD}" ] && [ -n "${MAITAVERN_KEY_ALIAS}" ]; then
              keytool -list \
                -keystore android-ci/maitavern-release.keystore \
                -storepass "${MAITAVERN_KEYSTORE_PASSWORD}" \
                -alias "${MAITAVERN_KEY_ALIAS}" > /dev/null
              echo "Release keystore validation passed."
            fi
          else
            echo "No release keystore secret found; release APK will be signed with debug key."
          fi

      - name: Build release APK
        working-directory: android-ci
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          MAITAVERN_KEYSTORE_PATH: ${{ github.workspace }}/android-ci/maitavern-release.keystore
          MAITAVERN_KEYSTORE_PASSWORD: ${{ secrets.MAITAVERN_KEYSTORE_PASSWORD }}
          MAITAVERN_KEY_ALIAS: ${{ secrets.MAITAVERN_KEY_ALIAS }}
          MAITAVERN_KEY_PASSWORD: ${{ secrets.MAITAVERN_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: maitavern-release-apk
          path: android-ci/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Set release metadata
        id: meta
        run: |
          VERSION_NAME="1.0.${GITHUB_RUN_NUMBER}"
          TAG_NAME="v${VERSION_NAME}-run${GITHUB_RUN_ID}"
          SOURCE_APK="android-ci/app/build/outputs/apk/release/app-release.apk"
          RELEASE_APK="maitavern-${TAG_NAME}.apk"

          cp "$SOURCE_APK" "$RELEASE_APK"

          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_apk=${RELEASE_APK}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: MaiTavern ${{ steps.meta.outputs.version_name }}
          generate_release_notes: true
          files: ${{ steps.meta.outputs.release_apk }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
