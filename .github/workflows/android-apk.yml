name: Build MaiTavern APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
    paths:
      - "app.js"
      - "index.html"
      - "style.css"
      - "android-ci/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Prepare web assets
        run: |
          chmod +x android-ci/copy-web-assets.sh
          android-ci/copy-web-assets.sh

      - name: Restore release keystore (optional)
        env:
          MAITAVERN_KEYSTORE_BASE64: ${{ secrets.MAITAVERN_KEYSTORE_BASE64 }}
        run: |
          if [ -n "${MAITAVERN_KEYSTORE_BASE64}" ]; then
            echo "$MAITAVERN_KEYSTORE_BASE64" | base64 -d > android-ci/maitavern-release.keystore
          else
            echo "No release keystore secret found; release APK will be signed with debug key."
          fi

      - name: Build release APK
        working-directory: android-ci
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          MAITAVERN_KEYSTORE_PATH: ${{ github.workspace }}/android-ci/maitavern-release.keystore
          MAITAVERN_KEYSTORE_PASSWORD: ${{ secrets.MAITAVERN_KEYSTORE_PASSWORD }}
          MAITAVERN_KEY_ALIAS: ${{ secrets.MAITAVERN_KEY_ALIAS }}
          MAITAVERN_KEY_PASSWORD: ${{ secrets.MAITAVERN_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: maitavern-release-apk
          path: android-ci/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
