name: Build MaiTavern APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
    paths:
      - "app.js"
      - "index.html"
      - "style.css"
      - "android-ci/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Prepare web assets
        run: |
          chmod +x android-ci/copy-web-assets.sh
          android-ci/copy-web-assets.sh

      - name: Build debug APK
        working-directory: android-ci
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: maitavern-debug-apk
          path: android-ci/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
